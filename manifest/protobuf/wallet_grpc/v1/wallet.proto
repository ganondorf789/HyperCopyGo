syntax = "proto3";

package wallet_grpc.v1;

option go_package = "demo/api/wallet_grpc/v1";

service WalletService {
  rpc GetWalletList(GetWalletListReq) returns (GetWalletListRes);
}

message GetWalletListReq {
  string app_id     = 1;
  string app_secret = 2;
}

message GetWalletListRes {
  repeated WalletItem list = 1;
}

message WalletItem {
  int64  id                 = 1;
  string address            = 2;
  string api_wallet_address = 3;
  string remark             = 4;
  string balance            = 5;
  string total_margin_used  = 6;
  string withdrawable       = 7;
  string upnl               = 8;
  string deposit_wallet     = 9;
  string arb_withdraw_able  = 10;
  string bsc_withdraw_able  = 11;
  string created_at         = 12;
  string updated_at         = 13;
}
