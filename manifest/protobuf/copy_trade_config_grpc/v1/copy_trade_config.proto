syntax = "proto3";

package copy_trade_config_grpc.v1;

option go_package = "demo/api/copy_trade_config_grpc/v1";

service CopyTradeConfigService {
  rpc GetAutoCopyTradeConfigList(GetAutoCopyTradeConfigListReq) returns (GetAutoCopyTradeConfigListRes);
}

message GetAutoCopyTradeConfigListReq {
  string app_id     = 1;
  string app_secret = 2;
}

message GetAutoCopyTradeConfigListRes {
  repeated CopyTradeConfigItem list  = 1;
  int32 total                   = 2;
}

message CopyTradeConfigItem {
  int64  id                                = 1;
  int64  user_id                           = 2;
  string target_wallet                     = 3;
  string target_wallet_platform            = 4;
  string remark                            = 5;
  int64  follow_type                       = 6;
  int64  follow_once                       = 7;
  string position_conditions               = 8;
  string trader_conditions                 = 9;
  string tag_account_value                 = 10;
  string tag_profit_scale                  = 11;
  string tag_direction                     = 12;
  string tag_trading_rhythm                = 13;
  string tag_profit_status                 = 14;
  repeated string tag_trading_styles       = 15;
  string trader_metric_period              = 16;
  int64  follow_margin_mode                = 17;
  string follow_symbol                     = 18;
  int64  leverage                          = 19;
  int64  margin_mode                       = 20;
  int64  follow_model                      = 21;
  double follow_model_value                = 22;
  double min_value                         = 23;
  double max_value                         = 24;
  double max_margin_usage                  = 25;
  double tp_value                          = 26;
  double sl_value                          = 27;
  int64  opt_reverse_follow_order          = 28;
  int64  opt_followup_decrease             = 29;
  int64  opt_followup_increase             = 30;
  int64  opt_forced_liquidation_protection = 31;
  int64  opt_position_increase_opening     = 32;
  int64  opt_slippage_protection           = 33;
  string symbol_list_type                  = 34;
  string symbol_list                       = 35;
  string main_wallet                       = 36;
  string main_wallet_platform              = 37;
  int64  status                            = 38;
  string created_at                        = 39;
  string updated_at                        = 40;
}
